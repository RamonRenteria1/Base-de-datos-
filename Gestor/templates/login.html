{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-3 mt-5">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Bienvenido de vuelta</h3>
                
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label mb-0">Contraseña</label>
                            <a href="{{ url_for('recuperar_password') }}" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
                        </div>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold">Iniciar Sesión</button>
                </form>

                <div class="text-center mt-4">
                    <small>¿No tienes cuenta? <a href="{{ url_for('registro') }}" class="text-decoration-none fw-bold">Regístrate gratis</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
