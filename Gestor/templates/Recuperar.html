{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-3 mt-5">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-3">Recuperar Contraseña</h3>
                <p class="text-center text-muted small mb-4">Ingresa tu correo registrado y tu nueva contraseña para actualizar el acceso.</p>
                
                <form method="POST" action="{{ url_for('recuperar_password') }}">
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Nueva Contraseña</label>
                        <input type="password" name="nueva_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 rounded-pill fw-bold text-dark">Actualizar Contraseña</button>
                </form>

                <div class="text-center mt-4">
                    <small><a href="{{ url_for('login') }}" class="text-decoration-none text-muted">← Volver al inicio de sesión</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
